name: CI

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Sources/**'
      - 'scripts/**'
      - 'Package.swift'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Toolchain info
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Quick validation
        run: |
          xcrun swift package describe > /dev/null
          echo "✓ Package.swift valid"

      - name: Check formatting hygiene
        run: |
          set -euo pipefail
          echo "Checking trailing whitespace..."
          if grep -RInE "[[:blank:]]+$" Sources/ Package.swift scripts/ .github/workflows/build.yml; then
            echo "Error: trailing whitespace found"
            exit 1
          fi

          echo "Checking tab indentation in Swift files..."
          if grep -RInP "^\t+" Sources/ --include='*.swift'; then
            echo "Error: tab indentation found in Swift source"
            exit 1
          fi

      - name: Check for TODO comments
        run: |
          set -euo pipefail
          echo "Checking for TODO/FIXME comments..."
          if grep -RInE "TODO|FIXME" Sources/; then
            echo "Error: TODO/FIXME comments found"
            exit 1
          fi

      - name: Build Debug and capture warnings
        run: |
          set -euo pipefail
          BUILD_LOG="$(mktemp)"
          xcrun swift build 2>&1 | tee "$BUILD_LOG"
          if grep -i "warning:" "$BUILD_LOG"; then
            echo "Error: compilation warnings found"
            exit 1
          fi

      - name: Build Release
        run: xcrun swift build -c release
