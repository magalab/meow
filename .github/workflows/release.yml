name: Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.9.2'
      
      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || true)
          if [ -z "$VERSION" ]; then
            VERSION="0.1.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Get architecture
        id: arch
        run: |
          ARCH="$(uname -m)"
          echo "arch=$ARCH" >> $GITHUB_OUTPUT
      
      - name: Build DMG
        working-directory: .
        run: VERSION="${{ steps.version.outputs.version }}" bash scripts/build-dmg.sh
      
      - name: List artifacts
        working-directory: .
        run: ls -lh dist/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: meow-macos-${{ steps.version.outputs.version }}-${{ steps.arch.outputs.arch }}
          path: dist/Meow*.dmg
          retention-days: 30
